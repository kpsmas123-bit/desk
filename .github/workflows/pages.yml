name: Deploy Desk to GitHub Pages

# Publishes the static site in ./app to GitHub Pages on every push to main.
# No build step — Desk is plain HTML/CSS/JS that loads supabase-js from a CDN.
#
# One-time setup (YOU DO 6a): GitHub repo → Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the app/ folder as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./app

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
